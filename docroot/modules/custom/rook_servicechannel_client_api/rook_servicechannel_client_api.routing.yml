rook_servicechannel_client_api.pinlookup:
  path: '/api/client/1/pinlookup'
  defaults:
    _controller: '\Drupal\rook_servicechannel_client_api\Controller\ClientSessionController::pinLookup'
  requirements:
    _role: 'service'
    _permission: 'access rook client api'
  methods: [POST]

